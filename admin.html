<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Portal | Evergreen AI Link</title>
    <link rel="icon" href="assets/evergreen-ai-link-logo-clean.png">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="container nav">
        <a class="brand" href="index.html"><img class="brand-logo" src="assets/evergreen-ai-link-logo-clean.png" alt="Evergreen AI Link"></a>
        <div class="nav-links"><a href="admin.html">Admin</a><a href="client-portal.html">Client Portal</a><a href="faq.html">FAQ</a><a href="blog.html">Blog</a></div>
      </nav>
    </header>
    <main>
      <section class="page-hero">
        <div class="container">
          <p class="eyebrow">Admin portal</p>
          <h1>Manage clients, requests, content, and activity.</h1>
          <p class="lead">This dashboard is ready for Supabase tables and n8n writes. It currently shows preview data until the backend keys and tables are connected.</p>
        </div>
      </section>
      <section><div class="container" data-admin-dashboard></div></section>
      <section class="band">
        <div class="container">
          <div class="section-heading"><p class="eyebrow">Admin login</p><h2>Supabase Auth protected admin access.</h2></div>
          <form class="card" data-auth-form="admin">
            <label><span>Email</span><input type="email" name="email" autocomplete="email" required></label>
            <label><span>Password</span><input type="password" name="password" autocomplete="current-password" required></label>
            <button type="submit">Admin Login</button>
            <p class="form-status" data-form-status></p>
          </form>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="site.config.js"></script><script src="assets/app.js"></script><script src="assets/portal.js"></script>
  </body>
</html>
