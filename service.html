<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service | Evergreen AI Link</title>
    <link rel="icon" href="assets/evergreen-ai-link-logo-clean.png">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="container nav">
        <a class="brand" href="index.html"><img class="brand-logo" src="assets/evergreen-ai-link-logo-clean.png" alt="Evergreen AI Link"></a>
        <div class="nav-links">
          <a href="index.html">Home</a><a href="services.html">Services</a><a href="blog.html">Blog</a><a href="contact.html">Contact</a>
          <a class="button primary" data-booking-link href="#">Book a Call</a>
        </div>
      </nav>
    </header>
    <main>
      <section class="page-hero">
        <div class="container" data-service-detail></div>
      </section>
      <section>
        <div class="container form-shell">
          <div>
            <p class="eyebrow">Selected service</p>
            <h2 data-service-name>AI automation service</h2>
            <p>Send this request into the AI System Plan intake so the automation can start with the right context.</p>
          </div>
          <form class="card" data-n8n-form>
            <input type="hidden" name="selected_service" data-selected-service>
            <label><span>Name</span><input name="name" autocomplete="name" required></label>
            <label><span>Email</span><input type="email" name="email" autocomplete="email" required></label>
            <label><span>Business website</span><input name="website" autocomplete="url"></label>
            <label><span>What should this service fix?</span><textarea name="service_goal" required></textarea></label>
            <button type="submit">Request This Service</button>
            <p class="form-status" data-form-status></p>
          </form>
        </div>
      </section>
    </main>
    <footer class="site-footer"><div class="container footer-inner"><span class="footer-brand"><img src="assets/evergreen-ai-link-logo-clean.png" alt="Evergreen AI Link"></span><span>Practical AI systems for everyday business work.</span></div></footer>
    <script src="site.config.js"></script><script src="assets/app.js"></script>
  </body>
</html>
